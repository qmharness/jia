# 甲 (Jia) — 多模型配置
# 复制为 config.toml 并填入真实 API key
# Jia 项目由 .jia/ 目录标识，运行 `jia init [path]` 或通过 TUI 首次使用自动创建。

[server]
host = "127.0.0.1"
port = 3000

# 默认大模型
[llm]
default_main_model_provider = "deepseek"  # kind is "openai" (OpenAI-compatible)
default_aux_model_provider = "deepseek"
# /agent 网关端点的 system prompt(可选;缺省用内置 Jia 身份提示)
# system_prompt = "You are Jia (甲), Just Intelligence Agent (正是智能体). Respond concisely and directly."

# DeepSeek
[providers.deepseek]
kind = "openai"
models = ["deepseek-v4-pro", "deepseek-v4-flash"]
default_main_model = "deepseek-v4-pro"
default_aux_model = "deepseek-v4-flash"
api_key = "sk-..."
base_url = "https://api.deepseek.com"

# BigModel
[providers.bigmodel]
kind = "anthropic"
models = ["GLM-5.2", "GLM-4.5-Air"]
default_main_model = "GLM-5.2"
default_aux_model = "GLM-4.5-Air"
api_key = "YOUR_API_KEY"
base_url = "https://open.bigmodel.cn/api/anthropic"

# ── 安全沙箱配置（可选，以下为默认值） ───────────────────────────
# [security]
# workspace_root = "/path/to/workspace" # 沙箱根目录（默认：当前工作目录）
# allowed_paths = ["/tmp"]              # 根目录外的允许路径
# blocked_path_prefixes = [".git", ".env"]  # 始终阻止的路径前缀
# command_allowlist = []                # 如果非空，仅允许这些 shell 命令
# command_blocklist = ["rm -rf /", "mkfs.", "dd if=", "sudo rm"]  # 阻止的 shell 命令模式
# confirmation_timeout_secs = 30        # 用户确认超时（秒）
# sandbox_disabled = false              # true = 沙箱降至 Guarded 模式
# max_context_tokens = 8192             # 上下文窗口 token 预算
# compaction_threshold = 0.75            # 触发上下文裁剪的阈值（0.0–1.0）
#
# [security.sandbox]
# backend = "process"                    # 沙箱后端: process | docker | seatbelt | landlock
# timeout_seconds = 30                   # 命令执行超时（秒）
# memory_limit_mb = 512                  # 内存限制（MB）
# max_processes = 50                     # 最大子进程数
# file_size_limit_mb = 100               # 最大输出文件大小（MB）
# network_enabled = false                # 是否允许网络访问（Docker only）
# docker_image = "alpine:3.20"           # Docker 沙箱镜像
# cpu_limit = 1.0                        # CPU 核数限制（Docker only）

# ── MCP 协议集成（可选） ──────────────────────────────────────
# 连接 MCP (Model Context Protocol) 服务器，发现并注册其工具
#
# [[mcp_server]]
# name = "filesystem"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
#
# [[mcp_server]]
# name = "sqlite"
# command = "uvx"
# args = ["mcp-server-sqlite", "--db-path", "test.db"]

# ── IM 机器人（可选） ─────────────────────────────────────────
#
# [bots.telegram]
# token = "YOUR_BOT_TOKEN"
#
# [bots.discord]
# token = "YOUR_BOT_TOKEN"
# application_id = "YOUR_APP_ID"
# public_key = "YOUR_PUBLIC_KEY"
#
# [bots.wechat]
# account_id = "wxid_..."           # iLink Bot 账户 ID
# token = "YOUR_BOT_TOKEN"           # iLink Bot Token
# base_url = "https://ilinkai.weixin.qq.com"
# dm_policy = "open"
# group_policy = "disabled"
# allowed_users = "wxid_aaa,wxid_bbb"  # DM 白名单（dm_policy=allowlist 时生效）

# ── 认知架构 ──────────────────────────────────────────────
[cognition]
# 确定度驱动自适应终止（TurnCertainty）
certainty_enabled = true
# 种子共现矩阵 + 同步检索增强
coactivation_enabled = true
# 八神全激活 + SSE 全量转发
observation_enabled = true
# 确定性完成检查清单
checklist_enabled = true
# 上下文重置（长会话续命）
reset_enabled = true

# ── Web Dashboard ──────────────────────────────────────────
# Path to frontend/dist/ for jia web.
# Leave empty to disable web UI.
# web_dir = "../jia-frontend/dist"
