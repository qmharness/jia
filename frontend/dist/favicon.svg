<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#2d2f45"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b8c1a"/>
      <stop offset="100%" stop-color="#7cb83a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle inner ring -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/>
  <!-- 甲 character centered -->
  <text x="256" y="340" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="300" font-weight="600" fill="url(#accent)" letter-spacing="0">甲</text>
</svg>
